name: docker

on:
  push:
    # main -> :latest (+ the release tags below). beta -> :beta, a rolling test
    # channel users can opt into (ghcr.io/.../neolink.net:beta) without touching
    # stable; the :beta tag comes from the type=ref,event=branch rule below.
    branches: [main, beta]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to immutable commit SHAs (tags can be repointed if an
      # action repo is ever compromised); the comment tracks the release.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # amd64 + arm64 (Raspberry Pi / ARM NAS boxes are common camera hosts)
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Release tags (vX.Y.Z) become the app's self-reported version — the
      # Dockerfile falls back to the csproj <Version> when this is empty.
      - id: ver
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Home Assistant add-on images: the app image plus the options/MQTT launcher
  # (see neolink-addon/). The Supervisor installs prebuilt per-arch images —
  # ghcr.io/borexola/neolink.net-addon-{arch}:<version> — where <version> must
  # equal the `version:` in the add-on's config.yaml.
  # Built on release tags (:X.Y.Z), the beta branch (rolling :beta, from the
  # neolink.net:beta app image) and workflow_dispatch (:edge, from :latest).
  addon:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/beta' || github.event_name == 'workflow_dispatch'
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag/base of the add-on image, mirroring the app image it wraps:
      #   release tag v*  -> the semver (must match the release add-on's version)
      #   beta branch     -> rolling :beta (from the neolink.net:beta app image)
      #   manual dispatch -> :edge on top of :latest, never a version users get
      - id: addonver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "base=ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/heads/beta ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "base=ghcr.io/${{ github.repository }}:beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=edge" >> "$GITHUB_OUTPUT"
            echo "base=ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: neolink-addon
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}-addon-${{ matrix.arch }}:${{ steps.addonver.outputs.tag }}
          build-args: |
            BUILD_FROM=${{ steps.addonver.outputs.base }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
