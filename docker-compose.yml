services:
  neolink:
    # Prebuilt image from GitHub Container Registry:
    image: ghcr.io/borexola/neolink.net:latest
    # ...or build from source instead: comment `image:` out and uncomment:
    # build: .
    container_name: neolink
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP (TCP-interleaved works for ffmpeg/Frigate/VLC)
      - "8555:8555"   # web UI + API; remove if webui:false and API unused
    volumes:
      - ./config.json:/config/config.json:ro
    # For RTSP over UDP transport, prefer host networking instead of port maps:
    # network_mode: host
