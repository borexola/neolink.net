services:
  neolink:
    # Prebuilt image from GitHub Container Registry:
    image: ghcr.io/borexola/neolink.net:latest
    # ...or build from source instead: comment `image:` out and uncomment:
    # build: .
    container_name: neolink
    restart: unless-stopped
    environment:
      # Time zone for timestamps (event folders, clip names, the UI clock).
      # Use a tz database name; defaults to UTC when unset.
      - TZ=Europe/London
    ports:
      - "8654:8654"   # RTSP (TCP-interleaved works for ffmpeg/Frigate/VLC)
      - "8655:8655"   # web UI + API; remove if webui:false and API unused
    volumes:
      # Config directory (not a single file): config.json lives here, and the web
      # UI's runtime settings (settings.json) are persisted next to it.
      - ./config:/config
      # Event recording storage: uncomment and set "recording": { "path": "/recordings" }
      # in config.json to capture detection events (clips + thumbnails) here.
      # - ./recordings:/recordings
      # Optional tiered storage (see "Tiered storage" in the README):
      # fast SSD tier for event clips — pair with "clips_path": "/clips"
      # - /mnt/fast-ssd/neolink:/clips
      # cold archive tier on a different (bigger/slower) drive — pair with
      # "archive_path": "/archive"; expired footage moves here instead of
      # being deleted once archiving is enabled per camera in the web UI
      # - /mnt/bigdisk/neolink:/archive
    # For RTSP over UDP transport, prefer host networking instead of port maps:
    # network_mode: host
